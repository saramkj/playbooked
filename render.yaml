services:
  - type: web
    name: playbooked-api
    runtime: node
    plan: starter
    region: oregon
    buildCommand: pnpm install --frozen-lockfile && pnpm build:api
    preDeployCommand: pnpm db:deploy
    startCommand: pnpm start:api
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: playbooked-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: playbooked-redis
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: WEB_ORIGIN
        sync: false

  - type: web
    name: playbooked-web
    runtime: static
    buildCommand: pnpm install --frozen-lockfile && pnpm build:web
    staticPublishPath: apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_ORIGIN
        sync: false

  - type: keyvalue
    name: playbooked-redis
    plan: starter
    ipAllowList: []

databases:
  - name: playbooked-db
    plan: basic-256mb
    region: oregon
    databaseName: playbooked
